<div class="page-header">
  <h2>Ofertas disponibles</h2>
  <div class="vista-toggle">
    <button [class.active]="vista() === 'lista'" (click)="vista.set('lista')" title="Vista lista">☰</button>
    <button [class.active]="vista() === 'tarjetas'" (click)="vista.set('tarjetas')" title="Vista tarjetas">⊞</button>
  </div>
</div>
@if (!authService.estaAutenticado()) {
  <div class="banner-login">
    <p>Mostrando 3 ofertas. <a routerLink="/login">Inicia sesión</a> para ver todas.</p>
  </div>
}
@if (vista() === 'lista') {
  <div class="vista-lista">
    @for (oferta of ofertas(); track oferta.id) {
      <app-oferta-card [oferta]="oferta" modo="lista" /> 
    }
  </div>
}

@if (vista() === 'tarjetas') {
  <div class="carrusel-wrapper">
    <button class="carrusel-btn" (click)="scrollCarrusel(-1)">←</button>
    <div class="vista-tarjetas" #carrusel>
      @for (oferta of ofertas(); track oferta.id) {
        <app-oferta-card [oferta]="oferta" modo="tarjeta" />
      }
    </div>
    <button class="carrusel-btn" (click)="scrollCarrusel(1)">→</button>
  </div>
}
