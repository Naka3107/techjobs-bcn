<div class="login-container">
  <h2>Iniciar sesión</h2>

  <div class="formulario">
    <div class="field">
      <label>Email</label>
      <input type="email" (input)="email.set($any($event).target.value)" placeholder="tu@email.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" (input)="password.set($any($event).target.value)" placeholder="••••••">
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button (click)="login()" [disabled]="cargando()">
      {{ cargando() ? 'Entrando...' : 'Entrar' }}
    </button>

    <p class="registro-link">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
