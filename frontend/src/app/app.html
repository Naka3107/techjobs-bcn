<nav>
  <a class="nav-brand" routerLink="/">TechJobs</a>

    <li><a routerLink="/ofertas" routerLinkActive="active">{{ authService.esEmpresa() ? 'Mis Ofertas' : 'Ofertas' }}</a></li>

      <li><a routerLink="/buscador" routerLinkActive="active">Buscador</a></li>

    } @else {
      <li><a routerLink="/login" routerLinkActive="active">Login</a></li>
      <li><a routerLink="/registro" routerLinkActive="active">Registro</a></li>
    }
  </ul>
</nav>
